services:
  # Frontend: Vue 3 app served by nginx
  tts:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tts
    restart: always
    networks:
      - web
      - tts_internal
    depends_on:
      - tts-backend

  # Backend: Node.js Express API + job processor
  tts-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tts-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=4001
      - STORAGE_PATH=/storage/tts-output
      - DATABASE_PATH=/data/tts.db
      - PIPER_HOST=tts-piper
      - PIPER_PORT=10200
      - CONCURRENT_JOBS=1
    volumes:
      - tts_storage:/storage
      - tts_data:/data
    networks:
      - tts_internal
    depends_on:
      - tts-piper

  # Piper TTS: Wyoming protocol server with German voice
  tts-piper:
    build:
      context: ./piper
      dockerfile: Dockerfile
    container_name: tts-piper
    restart: always
    environment:
      - PIPER_VOICE=de-thorsten-medium
      - PIPER_MAX_PROCS=1
    volumes:
      - tts_storage:/storage/tts-output
    networks:
      - tts_internal
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

volumes:
  tts_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lam/services/tts/storage
  tts_data:
  piper_voices:

networks:
  tts_internal:
    driver: bridge
  web:
    external: true
